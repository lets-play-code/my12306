spring:
  datasource:
    url: jdbc:mysql://mysql.tool.net:23306/db?autoReconnect=true&createDatabaseIfNotExist=true&characterEncoding=utf8&characterSetResults=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: admin
    password: 123456
  jpa:
    show-sql: true
    hibernate:
      naming-strategy: org.hibernate.cfg.ImprovedNamingStrategy
    properties:
      hibernate:
        default_catalog: db
        dialect: org.hibernate.dialect.MySQL5Dialect

  flyway:
    enabled: true
    clean-disabled: true
    baseline-on-migrate: true
    out-of-order: false
    locations: classpath:db/migration
    ignore-ignored-migrations: true
    ignore-missing-migrations: true

server:
  port: 8080

# JWT configuration
jwt:
  secret: ${JWT_SECRET:mySecretKey123456789012345678901234567890123456789012345678901234567890123456789012345678901234567890123456789012345678901234567890}
  expiration: 86400000

#logging.level.root: TRACE

---
spring:
  config:
    activate:
      on-profile: dev
  flyway:
    enabled: true
    # Nothing special here; our R__1_seed_demo_data.sql truncates and reseeds each startup
    locations: classpath:db/migration
  clean-disabled: false
  baseline-on-migrate: true
  out-of-order: false

---
# 测试专用配置：使用独立的 MySQL 数据库和不同端口，与 bootRun 完全隔离
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:mysql://mysql.tool.net:23306/db_test?autoReconnect=true&createDatabaseIfNotExist=true&characterEncoding=utf8&characterSetResults=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: admin
    password: 123456
  jpa:
    show-sql: true
    hibernate:
      naming-strategy: org.hibernate.cfg.ImprovedNamingStrategy
    properties:
      hibernate:
        default_catalog: db_test
        dialect: org.hibernate.dialect.MySQL5Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8081
